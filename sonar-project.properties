sonar.projectKey=christophe_project
sonar.projectName=Dennlys_Parc

# Keep Sonar scope focused on maintainable source code
sonar.sources=src

# Exclude generated files and heavy static assets from code analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/public/assets/**,**/*.min.js

sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Optional coverage import (ignored if file does not exist)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=public/assets/**,src/styles/**
sonar.sourceEncoding=UTF-8
