# Real source directories in this repository
sonar.sources=src,public/assets/js

# Exclude generated files and heavy static assets from code analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/public/assets/images/**,**/public/assets/video/**,**/public/assets/fonts/**,**/public/assets/data/**,**/*.min.js

# Optional coverage import (ignored if file does not exist)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
