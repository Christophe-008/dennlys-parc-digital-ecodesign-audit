name: Responsible CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: responsible-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Code quality with SonarQube
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build --if-present
      - run: pnpm test --if-present

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v8

  eco-budget:
    name: Eco/performance budget
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build --if-present

      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./.lighthouserc.json
          uploadArtifacts: false
          temporaryPublicStorage: true

      - name: Add Lighthouse report link
        if: always()
        uses: actions/github-script@v9
        env:
          LIGHTHOUSE_LINKS: ${{ steps.lighthouse.outputs.links }}
          LIGHTHOUSE_STATUS: ${{ steps.lighthouse.outcome }}
        with:
          script: |
            const fs = require('fs')
            const linksRaw = process.env.LIGHTHOUSE_LINKS
            const lighthouseStatus = process.env.LIGHTHOUSE_STATUS || 'unknown'
            const summaryPath = process.env.GITHUB_STEP_SUMMARY

            if (!linksRaw || linksRaw === 'null') {
              const lines = [
                '### Lighthouse',
                '',
                `- No public report link found (lighthouse step outcome: \`${lighthouseStatus}\`).`,
                '- Check previous Lighthouse logs in this job for details.'
              ]
              fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`)
              return
            }

            const links = JSON.parse(linksRaw)
            const lines = ['### Lighthouse', '']
            for (const [url, report] of Object.entries(links)) {
              lines.push(`- [${url}](${report})`)
            }

            fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`)
