name: EcoIndex

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ecoindex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ecoindex:
    name: EcoIndex with GreenIT Analysis CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Run GreenIT analysis
        env:
          GREENIT_CLI_REF: c4fec990458591d48871d9bd0668d79962d1a9a3
        run: |
          mkdir -p artifacts/greenit/input artifacts/greenit/output
          cp .github/greenit/scenarios.yaml artifacts/greenit/input/url.yaml
          chmod -R 775 artifacts/greenit
          chmod -R a+rwX artifacts/greenit/output

          npm run serve:lhci > artifacts/greenit/app.log 2>&1 &
          APP_PID=$!

          cleanup() {
            kill "$APP_PID" || true
          }

          trap cleanup EXIT

          for attempt in {1..60}; do
            if curl --silent --fail http://127.0.0.1:5173/ >/dev/null; then
              break
            fi
            sleep 2
          done

          curl --silent --fail http://127.0.0.1:5173/ >/dev/null

          git clone --depth 1 --branch master https://github.com/cnumr/GreenIT-Analysis-cli.git /tmp/GreenIT-Analysis-cli
          test "$(git -C /tmp/GreenIT-Analysis-cli rev-parse HEAD)" = "$GREENIT_CLI_REF"
          docker build -t greenit-analysis-cli /tmp/GreenIT-Analysis-cli

          docker run --init --rm --cap-add=SYS_ADMIN --network host \
            -v "$PWD/artifacts/greenit/input:/app/input" \
            -v "$PWD/artifacts/greenit/output:/app/output" \
            -e TZ=Europe/Paris \
            --name GreenIT-Analysis \
            greenit-analysis-cli \
            greenit analyse /app/input/url.yaml /app/output/report.html --format html --max_tab=1 --timeout=60000 --retry=1 --headless true --language fr

      - name: Upload GreenIT report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: greenit-analysis-report
          path: artifacts/greenit
          if-no-files-found: warn

      - name: Add GreenIT summary
        if: always()
        run: |
          echo "### EcoIndex" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pages measured: \`/\` and \`/products\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Scenario file: \`.github/greenit/scenarios.yaml\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTML report artifact: \`greenit-analysis-report\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tool source: https://github.com/cnumr/GreenIT-Analysis-cli" >> "$GITHUB_STEP_SUMMARY"
